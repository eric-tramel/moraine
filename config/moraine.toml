[clickhouse]
url = "http://127.0.0.1:8123"
database = "moraine"
username = "default"
password = ""
timeout_seconds = 30.0
request_compression = "none"
async_insert = true
wait_for_async_insert = true

# Named ClickHouse backends with per-project routing. The [clickhouse] block
# above IS the `default` backend (declaring both [clickhouse] and
# [backends.default] is a config error). Sessions whose working directory
# matches a route are MIRRORED to the named backend in addition to the local
# default; moraine never runs migrations against non-default backends, so the
# remote schema must already match this build. A repo can also opt in by name
# with a `.moraine.toml` containing `backend = "team-ch"`. See
# docs/configuration.md ("Backends and Per-Project Routing") for details.
# [backends.team-ch]
# url = "https://ch.team.example:8443"
# database = "moraine_team"
# username = "svc-moraine"
# password = ""
# request_compression = "gzip"
# # Accept a server whose migration ledger is ahead of this moraine build.
# allow_newer_server = false

# [[routes]]
# dir = "~/src/teamproject/**"  # first matching route wins; `/**` includes the base dir
# backend = "team-ch"
# mode = "mirror"               # default; the only supported mode

[identity]
# Stable person identity stamped on raw_events/events. Leave empty for
# local-only installs. Required for mirroring to non-default backends.
author = ""

[redaction]
# Secret redaction is default-on for all ingestion. This flag is honored only
# from $HOME/.moraine/config.toml, and only for the local/default backend;
# mirror egress to named backends is always redacted.
# dangerously_skip_secret_redaction = true
ruleset = "builtin"
# extra_patterns = ["acme_internal_[A-Za-z0-9]{32}"]

[ingest]
# Session cwd globs; a trailing `/**` includes the project directory itself.
exclude_project_dirs = []
batch_size = 4000
max_batch_bytes = 8388608
flush_interval_seconds = 0.5
state_dir = "~/.moraine/ingestor"
backfill_on_start = true
max_file_workers = 8
max_inflight_batches = 16
debounce_ms = 50
reconcile_interval_seconds = 30.0
heartbeat_interval_seconds = 5.0

[[ingest.sources]]
name = "codex"
harness = "codex"
enabled = true
glob = "~/.codex/sessions/**/*.jsonl"
watch_root = "~/.codex/sessions"

[[ingest.sources]]
name = "claude"
harness = "claude-code"
enabled = true
glob = "~/.claude/projects/**/*.jsonl"
watch_root = "~/.claude/projects"

# macOS local Claude Cowork sessions use the same claude-code normalizer.
# `moraine setup` adds this source on macOS; the exact default Claude source
# above also gains it in memory during config loading. Custom configs can add:
# [[ingest.sources]]
# name = "claude-cowork"
# harness = "claude-code"
# enabled = true
# glob = "~/Library/Application Support/Claude/local-agent-mode-sessions/**/.claude/projects/**/*.jsonl"
# watch_root = "~/Library/Application Support/Claude/local-agent-mode-sessions"

[[ingest.sources]]
name = "kimi-cli"
harness = "kimi-cli"
enabled = true
glob = "~/.kimi/sessions/**/wire.jsonl"
watch_root = "~/.kimi/sessions"
format = "jsonl"

[[ingest.sources]]
name = "qwen-code"
harness = "qwen-code"
enabled = true
glob = "~/.qwen/projects/*/chats/*.jsonl"
watch_root = "~/.qwen/projects"
format = "jsonl"

[[ingest.sources]]
name = "opencode"
harness = "opencode"
enabled = true
glob = "~/.local/share/opencode/opencode*.db"
watch_root = "~/.local/share/opencode"
format = "opencode_sqlite"

[[ingest.sources]]
name = "cursor"
harness = "cursor"
enabled = true
glob = "~/.cursor/projects/*/agent-transcripts/**/*.jsonl"
watch_root = "~/.cursor/projects"
format = "jsonl"

# Cursor IDE chat history: composer sessions and message bubbles stored in
# Cursor's `state.vscdb` SQLite databases, polled read-only by the
# `cursor_sqlite` format. Cursor has no stable local-database contract, so an
# editor update can change the schema at any time (issue #361); when it
# drifts, moraine reports rate-limited `sqlite_*` ingest errors and skips the
# database rather than ingesting bad rows, and the normalizer gets updated to
# follow the format. On Linux use `~/.config/Cursor/User` for the glob and
# watch_root instead.
[[ingest.sources]]
name = "cursor-sqlite"
harness = "cursor"
enabled = true
glob = "~/Library/Application Support/Cursor/User/**/state.vscdb"
watch_root = "~/Library/Application Support/Cursor/User"
format = "cursor_sqlite"

[[ingest.sources]]
name = "pi"
harness = "pi-coding-agent"
enabled = true
glob = "~/.pi/agent/sessions/**/*.jsonl"
watch_root = "~/.pi/agent/sessions"
format = "jsonl"

# OMP (oh-my-pi) uses the same session schema as Pi but writes to ~/.omp.
# Keep this source separate so historical ~/.pi sessions remain available.
[[ingest.sources]]
name = "omp"
harness = "pi-coding-agent"
enabled = true
glob = "~/.omp/agent/sessions/**/*.jsonl"
watch_root = "~/.omp/agent/sessions"
format = "jsonl"

# Hermes Agent LIVE sessions: one JSON file per conversation under
# ~/.hermes/sessions/ that the agent rewrites in place every turn.
# `format = "session_json"` opts into the rewrite-aware processor that emits
# only the newly appended messages on each watcher notify. Leave `format`
# unset and moraine will infer it from the `.json` glob.
[[ingest.sources]]
name = "hermes"
harness = "hermes"
enabled = true
glob = "~/.hermes/sessions/session_*.json"
watch_root = "~/.hermes/sessions"
format = "session_json"

# Hermes Agent offline trajectories: ShareGPT-compatible JSONL written by
# the datagen batch runner. Point at whatever directory your runner writes
# `trajectory_samples.jsonl` to. Uncomment and adjust when you need it.
# [[ingest.sources]]
# name = "hermes-trajectories"
# harness = "hermes"
# enabled = true
# glob = "~/trajectories/**/*.jsonl"
# watch_root = "~/trajectories"
# format = "jsonl"

[mcp]
max_results = 25
preview_chars = 320
default_context_before = 3
default_context_after = 3
default_include_tool_events = false
default_exclude_codex_mcp = true
prewarm_on_initialize = false
async_log_writes = true
protocol_version = "2024-11-05"
# Retrievals beyond this process-wide execution limit enter a 16-request FIFO
# queue. Omit for the default of 8 executing requests. Queued and running
# retrievals have no fixed admission deadline; a full queue is rejected
# immediately.
# max_parallel_requests = 16
# MCP clients first try the unified backend's Unix socket, then transparently
# fall back to an embedded server when the socket is absent or unreachable.
# This proxy preference is independent of whether `moraine up` launches the
# backend.
use_central_server = true
# Bare filename resolves under the runtime pids dir -> ~/.moraine/run/mcp.sock.
central_socket_path = "mcp.sock"
central_connect_timeout_ms = 250

[backend]
# Interface for the monitor HTTP listener. Keep the loopback default unless you
# understand the experimental non-loopback startup guard documented below.
bind = "127.0.0.1"
# A non-loopback bind requires a non-whitespace startup guard token. This does
# not authenticate HTTP requests.
# auth_token = "<generate-a-random-guard-token>"
# Launch the unified MCP socket + monitor HTTP backend from `moraine up`.
# Keep this opt-in for the first backend-daemon release.
start_on_up = false

[bm25]
k1 = 1.2
b = 0.75
default_min_score = 0.0
default_min_should_match = 1
max_query_terms = 32

[monitor]
port = 8080

[runtime]
root_dir = "~/.moraine"
logs_dir = "logs"
pids_dir = "run"
service_bin_dir = "~/.local/bin"
managed_clickhouse_dir = "~/.local/lib/moraine/clickhouse/current"
clickhouse_start_timeout_seconds = 30.0
healthcheck_interval_ms = 500
clickhouse_auto_install = true
clickhouse_version = "v25.12.5.44-stable"
