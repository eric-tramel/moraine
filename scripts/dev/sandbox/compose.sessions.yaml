# Moraine dev sandbox — optional host-session overlay. See RFC #232.
#
# Layered in by `moraine-sandbox` via `-f compose.yaml -f compose.sessions.yaml`
# when the caller opts in to mounting the host's real session archives
# (SANDBOX_MOUNT_HOST_SESSIONS=1). The base compose file never references
# these mounts, so the overlay is the only place they are defined.
#
# Additional environment variables the host CLI must export:
#   SANDBOX_CODEX_SESSIONS_DIR    host ~/.codex/sessions, read-only
#   SANDBOX_CLAUDE_PROJECTS_DIR   host ~/.claude/projects, read-only
#   SANDBOX_HERMES_SESSIONS_DIR   host ~/.hermes/sessions, read-only
#                                 (live per-session JSON files the Hermes CLI
#                                 rewrites in place; exercises the
#                                 format = "session_json" path)
#   SANDBOX_KIMI_SESSIONS_DIR     host ~/.kimi/sessions, read-only
#                                 (wire.jsonl files written by the Kimi CLI)
#   SANDBOX_KIRO_SESSIONS_DIR     host ~/.kiro/sessions/cli, read-only
#                                 (paired JSONL transcripts and JSON metadata
#                                 ingested via format = "kiro_session")
#   SANDBOX_CURSOR_PROJECTS_DIR   host ~/.cursor/projects, read-only
#                                 (Agent JSONL transcript files under
#                                 agent-transcripts/)
#   SANDBOX_CURSOR_STATE_DIR      host Cursor User state dir, read-only
#                                 (~/Library/Application Support/Cursor/User
#                                 on macOS, ~/.config/Cursor/User on Linux;
#                                 state.vscdb SQLite databases ingested via
#                                 the format = "cursor_sqlite" path)

services:
  moraine:
    volumes:
      - "${SANDBOX_CODEX_SESSIONS_DIR}:/host/codex/sessions:ro"
      - "${SANDBOX_CLAUDE_PROJECTS_DIR}:/host/claude/projects:ro"
      - "${SANDBOX_HERMES_SESSIONS_DIR}:/host/hermes/sessions:ro"
      - "${SANDBOX_KIMI_SESSIONS_DIR}:/host/kimi/sessions:ro"
      - "${SANDBOX_KIRO_SESSIONS_DIR}:/host/kiro/sessions:ro"
      - "${SANDBOX_CURSOR_PROJECTS_DIR}:/host/cursor/projects:ro"
      - "${SANDBOX_CURSOR_STATE_DIR}:/host/cursor/state:ro"
