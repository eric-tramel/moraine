# Moraine dev sandbox — compose file. See RFC #232.
#
# Two services:
#   * clickhouse — upstream clickhouse/clickhouse-server image at the pinned
#     version (see config/moraine.toml runtime.clickhouse_version). Docker
#     compose owns its lifecycle; moraine connects via compose DNS.
#   * moraine   — a full dev environment. Boots, cargo-builds the mounted
#     worktree, then runs the moraine stack (ingest + monitor, optional mcp).
#     Agents shell in to iterate on the workspace; cargo / rustc / rustup are
#     all installed in the image, wrapped by sccache.
#
# This file is always loaded by `moraine-sandbox`. When the caller opts in to
# mounting host session archives, the sibling `compose.sessions.yaml` overlay
# is layered on top with `-f compose.sessions.yaml`.
#
# Environment variables the host CLI must export before `docker compose up`:
#   COMPOSE_PROJECT_NAME              per-sandbox project name (container name)
#   SANDBOX_CLICKHOUSE_IMAGE          e.g. clickhouse/clickhouse-server:25.12.5.44
#   SANDBOX_MONITOR_HOST_PORT         host port published to moraine :8080
#   SANDBOX_CLICKHOUSE_HTTP_HOST_PORT host port published to clickhouse :8123
#   SANDBOX_CLICKHOUSE_TCP_HOST_PORT  host port published to clickhouse :9000
#   SANDBOX_REPO_ROOT                 worktree root, mounted at /repo        (ro)
#   SANDBOX_WEB_DIR                   monitor dist dir, mounted at /opt/moraine/web (ro)
#   SANDBOX_CONFIG_DIR                generated config dir, mounted at /sandbox (ro)
#   SANDBOX_ENTRYPOINT                path to entrypoint.sh in the worktree  (ro)
#   SANDBOX_SCCACHE_HOST_DIR          host $SCCACHE_DIR (or equivalent),
#                                     mounted rw at /home/moraine/.cache/sccache
#                                     so builds inside the sandbox share the
#                                     host's sccache disk cache. Defaulted to
#                                     /tmp by ensure_compose_env when unset, so
#                                     sandboxes on hosts without sccache still
#                                     start — they just don't share a cache.
#   SANDBOX_REBUILD                   set to "1" to force a fresh cargo build
#                                     on boot even if /opt/moraine/bin is
#                                     already populated (default 0 = skip if
#                                     the binaries volume already has output
#                                     from a prior boot).
#
# The `moraine` service points at a single shared runtime image
# (moraine-sandbox-runtime:latest) rather than a per-sandbox image. The runtime
# image contains no per-sandbox content — worktree source, generated config,
# cargo target dir, cargo registry, and the built binaries themselves all
# arrive via bind mount or named volume. First `up` builds the shared image;
# subsequent `up`s reuse it via Docker's layer cache.
#
# Named volumes (per-project, lifecycle follows the sandbox):
#   binaries         — /opt/moraine/bin, populated by entrypoint's cargo build
#   cargo-home       — /home/moraine/.cargo, cargo registry + git cache
#   cargo-target     — /home/moraine/target, CARGO_TARGET_DIR
#   state            — /home/moraine/.moraine, moraine runtime state
#   clickhouse-data  — /var/lib/clickhouse, ClickHouse storage

services:
  clickhouse:
    image: ${SANDBOX_CLICKHOUSE_IMAGE}
    container_name: ${COMPOSE_PROJECT_NAME}-clickhouse
    restart: "no"
    environment:
      CLICKHOUSE_DB: moraine
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "0"
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - "clickhouse-data:/var/lib/clickhouse"
    ports:
      - "${SANDBOX_CLICKHOUSE_HTTP_HOST_PORT}:8123"
      - "${SANDBOX_CLICKHOUSE_TCP_HOST_PORT}:9000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8123/ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  moraine:
    image: moraine-sandbox-runtime:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}
    user: "1000:1000"
    tty: true
    stdin_open: true
    restart: "no"
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      SANDBOX_CLICKHOUSE_HOST: clickhouse
      SANDBOX_CLICKHOUSE_PORT: "8123"
      SANDBOX_REBUILD: "${SANDBOX_REBUILD:-0}"
    ports:
      - "${SANDBOX_MONITOR_HOST_PORT}:8080"
    volumes:
      - "${SANDBOX_REPO_ROOT}:/repo:ro"
      - "${SANDBOX_WEB_DIR}:/opt/moraine/web:ro"
      - "${SANDBOX_CONFIG_DIR}:/sandbox:ro"
      - "${SANDBOX_ENTRYPOINT}:/usr/local/bin/entrypoint.sh:ro"
      - "${SANDBOX_SCCACHE_HOST_DIR}:/home/moraine/.cache/sccache"
      - "binaries:/opt/moraine/bin"
      - "cargo-home:/home/moraine/.cargo"
      - "cargo-target:/home/moraine/target"
      - "state:/home/moraine/.moraine"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      # start_period covers the initial cargo build, which on a cold sccache
      # against a full moraine workspace can take several minutes. With a warm
      # sccache (shared host cache) it drops to tens of seconds. The healthcheck
      # won't mark the container unhealthy until start_period expires, so a
      # slow build doesn't trigger a spurious restart.
      start_period: 900s

volumes:
  state: {}
  clickhouse-data: {}
  binaries: {}
  cargo-home: {}
  cargo-target: {}
